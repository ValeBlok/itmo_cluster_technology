[control_plane]
cp1 ansible_host=192.168.1.10

[workers]
w1 ansible_host=192.168.1.11
w2 ansible_host=192.168.1.12
w3 ansible_host=192.168.1.13

# Группа, объединяющая все ноды кластера (не редактировать)
[k8s_cluster:children]
control_plane
workers

[all:vars]
# Пользователь на ВМ, под которым заходим по SSH
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3