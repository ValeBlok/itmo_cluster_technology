---
# подготовка нод
- name: Подготовка всех нод и установка компонентов
  hosts: k8s_cluster
  gather_facts: true
  roles:
    - common
    - containerd
    - kube_packages

# инициализация control-plane + CNI
- name: Инициализация control-plane
  hosts: control_plane
  gather_facts: true
  roles:
    - control_plane

# присоединение worker-нод
- name: Присоединение worker-нод
  hosts: workers
  gather_facts: true
  roles:
    - worker

# финальная проверка
- name: Проверка состояния кластера
  hosts: control_plane
  gather_facts: false
  tasks:
    - name: Подождать готовности всех нод (до 10 минут)
      ansible.builtin.command: >
        kubectl --kubeconfig /etc/kubernetes/admin.conf
        wait --for=condition=Ready nodes --all --timeout=600s
      changed_when: false

    - name: Показать список нод
      ansible.builtin.command: kubectl --kubeconfig /etc/kubernetes/admin.conf get nodes -o wide
      register: nodes_out
      changed_when: false

    - name: Вывести результат
      ansible.builtin.debug:
        msg: "{{ nodes_out.stdout_lines }}"
