---
- name: Установить Helm
  ansible.builtin.shell: |
    set -o pipefail
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
    creates: /usr/local/bin/helm

- name: Добавить Helm-репозиторий Cilium
  ansible.builtin.command: helm repo add cilium https://helm.cilium.io/
  register: helm_add
  changed_when: "'has been added' in helm_add.stdout"
  failed_when: helm_add.rc != 0 and 'already exists' not in helm_add.stderr

- name: Обновить Helm-репозитории
  ansible.builtin.command: helm repo update
  changed_when: false

- name: Установить / обновить Cilium
  ansible.builtin.command: >
    helm upgrade --install cilium cilium/cilium
    --version {{ cilium_version }}
    --namespace kube-system
    --set ipam.mode=kubernetes
    --set operator.replicas=1
    {% if cilium_kube_proxy_replacement %}
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ control_plane_endpoint }}
    --set k8sServicePort=6443
    {% endif %}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: cilium_install
  changed_when: "'has been upgraded' in cilium_install.stdout or 'has been installed' in cilium_install.stdout"
